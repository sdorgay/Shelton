<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h2> using form validition</h2>
    <form onsubmit="return checkform()">
        Name: <input type="text" id="name"> <br><br>
        Mobile No: <input type="text" id="mobile"> <br><br>
        Password: <input type="password" id="password"> <br><br>
        confirm password: <input type="password" id="cpassword"><br><br>
        <input type="submit" value="submit">
    </form>

    <script >
            function checkform(){
        let name = document.getElementById("name").value;
        let mobile = document.getElementById("mobile").value;
        let pass = document.getElementById("password").value;
        let cpass = document.getElementById("cpassword").value;

        if( name =="" || mobile =="" || pass =="" || cpass =="") {
            alert("All field are require");
            return false;
        }

        if(mobile.length !== 10) {
            alert("number must be 10 digits");
            return false;
        }

        if(pass !== cpass) { 
            alert("number do not match please check");
            return false;
        }

        alert("form sucessfullly submitted");

                }
       
        

    </script>
</body>
</html>
